name: Relay

on:
  workflow_run:
    workflows: ["Run Service"]
    types: [completed]

permissions:
  actions: write
  contents: read

jobs:
  relay:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for run-9router to fully finish
        run: |
          echo "Waiting for previous run to fully clean up..."
          sleep 60

          API_TOKEN="${{ secrets.GITHUB_TOKEN }}"
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"

          # 确认没有 in_progress 的 run-9router
          for i in $(seq 1 10); do
            COUNT=$(curl -sf -H "Authorization: Bearer $API_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/$OWNER/$REPO/actions/runs?workflow_id=run-9router.yml&status=in_progress&per_page=5" | \
              grep -c '"id"' || echo "0")
            if [ "$COUNT" = "0" ]; then
              echo "Previous run fully finished"
              break
            fi
            echo "Still running ($COUNT), waiting 30s..."
            sleep 30
          done

      - name: Trigger next run-9router
        run: |
          echo "Triggering next run-9router..."
          curl -sf -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Content-Type: application/json" \
            -d '{"ref":"main"}' \
            "https://api.github.com/repos/${{ github.repository_owner }}/${{ github.event.repository.name }}/actions/workflows/run-9router.yml/dispatches"
          echo "Next run triggered!"
