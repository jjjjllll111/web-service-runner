name: Run Service

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: run-group
  cancel-in-progress: true

env:
  UPLOAD_API_TOKEN: ${{ secrets.UPLOAD_API_TOKEN }}
  GH_OWNER: ${{ github.repository_owner }}
  GH_REPO: ${{ github.event.repository.name }}
  RUN_DURATION: 19800

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: oven-sh/setup-bun@v2

      - name: Clone latest project
        run: |
          git clone --depth 1 ${{ secrets.PROJECT_URL }} app
          cd app
          echo "Latest: $(git log -1 --format='%h %s | %ci')"

      - name: Install deps
        run: cd app && bun install

      - name: Build
        run: |
          cd app
          export NODE_ENV=production
          bun run build

      - name: Restore DB from private git repo
        run: |
          git clone https://x-access-token:${{ secrets.UPLOAD_API_TOKEN }}@github.com/${{ github.repository_owner }}/db-storage.git db-repo || mkdir db-repo
          mkdir -p app/data/db
          if [ -d db-repo ] && [ "$(ls -A db-repo 2>/dev/null | grep -v '^\.git$')" ]; then
            cp -r db-repo/* app/data/db/ 2>/dev/null || true
            rm -rf app/data/db/.git
            echo "DB and Tailscale state restored from db-storage."
          else
            echo "No existing DB - fresh start"
          fi

      - name: Restore Tailscale state from DB
        id: restore-tailscale
        run: |
          if [ -f "app/data/db/tailscale-state.tgz" ]; then
            sudo tar -xzf app/data/db/tailscale-state.tgz -C /
            echo "restored=true" >> $GITHUB_OUTPUT
            echo "Tailscale state restored from private release."
          else
            echo "restored=false" >> $GITHUB_OUTPUT
            echo "No Tailscale state found in private release."
          fi

      - name: Delete old Tailscale runner node
        if: steps.restore-tailscale.outputs.restored != 'true'
        env:
          TS_API_KEY: ${{ secrets.TS_API_KEY }}
        run: |
          python -c '
          import urllib.request
          import json
          import base64
          import os
          import sys

          api_key = os.environ.get("TS_API_KEY")
          if not api_key:
              print("TS_API_KEY not found in env")
              sys.exit(0)

          auth_header = base64.b64encode(f"{api_key}:".encode("utf-8")).decode("utf-8")
          req_get = urllib.request.Request("https://api.tailscale.com/api/v2/tailnet/-/devices")
          req_get.add_header("Authorization", f"Basic {auth_header}")
          req_get.add_header("Accept", "application/json")

          try:
              with urllib.request.urlopen(req_get) as response:
                  devices = json.loads(response.read().decode("utf-8")).get("devices", [])
          except Exception as e:
              print(f"Error fetching devices: {e}")
              sys.exit(0)

          for dev in devices:
              hostname = dev.get("hostname", "")
              if hostname.startswith("runner-funnel"):
                  dev_id = dev.get("id")
                  dev_name = dev.get("name", "unknown")
                  print("Deleting stale device: " + str(dev_name) + " (ID: " + str(dev_id) + ")")
                  req_del = urllib.request.Request("https://api.tailscale.com/api/v2/device/" + str(dev_id), method="DELETE")
                  req_del.add_header("Authorization", "Basic " + str(auth_header))
                  try:
                      with urllib.request.urlopen(req_del) as resp:
                          print("Deleted, status: " + str(resp.getcode()))
                  except Exception as ex:
                      print("Error deleting: " + str(ex))
          '

      - name: Detect Tailscale auth method
        id: ts-auth
        env:
          TS_OAUTH_CLIENT_ID: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          TS_OAUTH_SECRET: ${{ secrets.TS_OAUTH_SECRET }}
          TAILSCALE_AUTHKEY: ${{ secrets.TAILSCALE_AUTHKEY }}
        run: |
          if [ -n "$TS_OAUTH_CLIENT_ID" ] && [ -n "$TS_OAUTH_SECRET" ]; then
            echo "method=oauth" >> $GITHUB_OUTPUT
            echo "Using OAuth credentials"
          elif [ -n "$TAILSCALE_AUTHKEY" ]; then
            echo "method=authkey" >> $GITHUB_OUTPUT
            echo "Using authkey (deprecated, consider switching to OAuth)"
          else
            echo "::error::No Tailscale credentials found. Set TS_OAUTH_CLIENT_ID + TS_OAUTH_SECRET, or TAILSCALE_AUTHKEY"
            exit 1
          fi

      - name: Setup Tailscale (OAuth)
        if: steps.ts-auth.outputs.method == 'oauth'
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          hostname: runner-funnel
          statedir: /tmp/tailscale-state
          version: latest

      - name: Setup Tailscale (Authkey)
        if: steps.ts-auth.outputs.method == 'authkey'
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          tags: tag:ci
          hostname: runner-funnel
          statedir: /tmp/tailscale-state
          version: latest

      - name: Verify Tailscale connection
        run: |
          echo "=== Verifying Tailscale connection ==="
          for i in 1 2 3 4 5 6 7 8; do
            STATUS=$(tailscale status --json 2>/dev/null | jq -r '.BackendState' 2>/dev/null)
            echo "Attempt $i: BackendState=$STATUS"
            if [ "$STATUS" = "Running" ]; then
              echo "Tailscale is connected!"
              TS_IP=$(tailscale ip -4 2>/dev/null)
              echo "Tailscale IP: $TS_IP"
              DNS_NAME=$(tailscale status --json 2>/dev/null | jq -r '.Self.DNSName' 2>/dev/null)
              echo "DNS Name: $DNS_NAME"
              # Check health
              HEALTH=$(tailscale status --json 2>/dev/null | jq -r '.HealthIssues[]?' 2>/dev/null)
              if [ -n "$HEALTH" ]; then
                echo "Health issues: $HEALTH"
              fi
              exit 0
            fi
            sleep 3
          done
          echo "::error::Tailscale failed to connect after 8 attempts"
          tailscale status 2>/dev/null || true
          cat ~/tailscaled.log 2>/dev/null | tail -50 || true
          exit 1

      - name: Save Tailscale state for upload
        run: |
          sudo tar -czf app/data/db/tailscale-state.tgz -C /tmp tailscale-state

      - name: Start service
        id: start
        run: |
          cd app
          mkdir -p .next/standalone/public
          mkdir -p .next/standalone/.next/static
          cp -r public/* .next/standalone/public/ 2>/dev/null || true
          cp -r .next/static/* .next/standalone/.next/static/ 2>/dev/null || true
          cp -r open-sse .next/standalone/ 2>/dev/null || true
          mkdir -p .next/standalone/src
          cp -r src/mitm .next/standalone/src/ 2>/dev/null || true
          mkdir -p .next/standalone/node_modules
          cp -r node_modules/node-forge .next/standalone/node_modules/ 2>/dev/null || true
          cp -r node_modules/next .next/standalone/node_modules/ 2>/dev/null || true

          export APP_DIR="$PWD"
          export DATA_DIR="$APP_DIR/data"
          export PORT=20128
          export HOSTNAME=0.0.0.0
          export NODE_ENV=production

          cd .next/standalone
          nohup bun server.js > /tmp/app.log 2>&1 &
          APP_PID=$!
          echo "pid=$APP_PID" >> $GITHUB_OUTPUT
          echo "Service started with PID $APP_PID"
          sleep 3

          if kill -0 $APP_PID 2>/dev/null; then
            echo "Service process is alive"
          else
            echo "::error::Service died immediately"
            cat /tmp/app.log
            exit 1
          fi

          for i in 1 2 3 4 5; do
            if curl -sf http://127.0.0.1:20128/ -o /dev/null --max-time 5 2>/dev/null; then
              echo "Service responds on port 20128"
              break
            fi
            echo "Waiting for service to start... attempt $i"
            sleep 3
          done

      - name: Enable Tailscale Funnel
        id: funnel
        run: |
          echo "Enabling Funnel..."
          # Clear any stale Funnel/Serve config first
          sudo tailscale funnel --https=443 off 2>/dev/null || true
          sudo tailscale serve --https=443 off 2>/dev/null || true
          sleep 1

          # Start Funnel with explicit reset
          sudo tailscale funnel --bg --yes --https=443 20128
          sleep 5

          # Show Funnel status
          echo "--- Funnel Status ---"
          sudo tailscale funnel status 2>/dev/null || true

          # Fetch HTTPS certificates
          echo "Fetching HTTPS certificates..."
          TS_HOSTNAME=$(tailscale status --json 2>/dev/null | jq -r '.Self.DNSName' | sed 's/\.$//')
          if [ -n "$TS_HOSTNAME" ] && [ "$TS_HOSTNAME" != "null" ]; then
            sudo tailscale cert "$TS_HOSTNAME" || true
          else
            sudo tailscale cert runner-funnel.tail782b5f.ts.net || true
          fi

          # Determine Funnel URL
          FUNNEL_URL=$(sudo tailscale funnel status 2>/dev/null | grep -o 'https://[^ ]*' | head -1)
          if [ -z "$FUNNEL_URL" ]; then
            TS_HOSTNAME=$(tailscale status --json 2>/dev/null | jq -r '.Self.DNSName' | sed 's/\.$//')
            if [ -n "$TS_HOSTNAME" ] && [ "$TS_HOSTNAME" != "null" ]; then
              FUNNEL_URL="https://${TS_HOSTNAME}/"
            else
              FUNNEL_URL="https://runner-funnel.tail782b5f.ts.net/"
            fi
          fi
          echo "Funnel URL determined: $FUNNEL_URL"
          echo "url=$FUNNEL_URL" >> $GITHUB_OUTPUT

      - name: Verify Funnel connectivity
        run: |
          FUNNEL_URL="${{ steps.funnel.outputs.url }}"
          echo "Testing Funnel URL: $FUNNEL_URL"
          for i in 1 2 3 4 5 6; do
            HTTP_CODE=$(curl -sk -o /dev/null -w '%{http_code}' "$FUNNEL_URL" --max-time 15 2>/dev/null)
            echo "Attempt $i: HTTP status = $HTTP_CODE"
            if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 500 ] 2>/dev/null; then
              echo "Funnel is accessible!"
              exit 0
            fi
            echo "Waiting for Funnel to become available..."
            sleep 10
          done
          echo "::warning::Funnel may not be accessible. Check:"
          echo "  1. Tailscale ACL has nodeAttrs granting 'funnel' to tag:ci"
          echo "  2. ACL has tagOwner for tag:ci"
          echo "--- Diagnostic Info ---"
          sudo tailscale funnel status 2>/dev/null || true
          sudo tailscale status 2>/dev/null || true
          echo "--- Daemon Logs (last 50 lines) ---"
          cat ~/tailscaled.log 2>/dev/null | tail -50 || true

      - name: Show access info
        run: |
          TS_IP=$(tailscale ip -4 2>/dev/null)
          echo "=========================================="
          echo "  公网 Funnel: ${{ steps.funnel.outputs.url }}"
          echo "  Tailscale内网 (直连): http://$TS_IP:20128"
          echo "  Tailscale内网 (代连): http://$TS_IP"
          echo "  bun生产模式 | 5.5h | 每10min备份DB"
          echo "=========================================="
          echo "--- Tailscale Serve/Funnel Status ---"
          sudo tailscale serve status 2>/dev/null || true
          sudo tailscale funnel status 2>/dev/null || true
          echo "--- Tailscaled Daemon Logs ---"
          cat /home/runner/tailscaled.log 2>/dev/null | tail -n 150 || true
          echo "------------------------------"

      - name: Keep alive + periodic upload
        run: |
          upload_db() {
            echo "[$(date)] === DB upload to private git repo ==="
            sudo tar -czf app/data/db/tailscale-state.tgz -C /tmp tailscale-state 2>/dev/null || true
            if [ ! -d db-repo ]; then
              git clone https://x-access-token:${{ secrets.UPLOAD_API_TOKEN }}@github.com/${{ github.repository_owner }}/db-storage.git db-repo || mkdir db-repo
            fi
            (
              cd db-repo
              git config user.name "github-actions[bot]"
              git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
              if [ ! -d .git ]; then
                git init
                git remote add origin https://x-access-token:${{ secrets.UPLOAD_API_TOKEN }}@github.com/${{ github.repository_owner }}/db-storage.git
              fi
              find . -maxdepth 1 ! -name '.git' ! -name '.' ! -name '..' -exec rm -rf {} +
              cp -r ../app/data/db/* . 2>/dev/null || true
              git checkout --orphan temp-branch 2>/dev/null || git checkout -b temp-branch
              git add -A
              git commit -m "db backup" --allow-empty
              git branch -M main
              git push -f origin main
            )
            echo "[$(date)] === DB upload completed ==="
          }

          END=$((SECONDS + ${{ env.RUN_DURATION }}))
          LAST_UPLOAD=0
          while [ $SECONDS -lt $END ]; do
            if ! kill -0 ${{ steps.start.outputs.pid }} 2>/dev/null; then
              (
                echo "[$(date)] Service died, restarting..."
                cd app
                export APP_DIR="$PWD"
                export DATA_DIR="$APP_DIR/data"
                export PORT=20128
                export HOSTNAME=0.0.0.0
                export NODE_ENV=production
                cd .next/standalone
                nohup bun server.js > /tmp/app.log 2>&1 &
                echo "New PID: $!"
                sleep 5
                sudo tailscale funnel --bg --yes 20128 > /dev/null 2>&1 &
              )
            fi
            NOW=$(date +%s)
            if [ $((NOW - LAST_UPLOAD)) -ge 600 ]; then
              upload_db
              LAST_UPLOAD=$NOW
            fi
            REMAINING=$((END - SECONDS))
            echo "[$(date)] Remaining: $((REMAINING/3600))h $(((REMAINING%3600)/60))m"
            sleep 60
          done

      - name: Final upload
        if: always()
        run: |
          echo "=== Final DB Upload ==="
          kill ${{ steps.start.outputs.pid }} 2>/dev/null || true
          sleep 2
          sudo tar -czf app/data/db/tailscale-state.tgz -C /tmp tailscale-state 2>/dev/null || true
          if [ ! -d db-repo ]; then
            git clone https://x-access-token:${{ secrets.UPLOAD_API_TOKEN }}@github.com/${{ github.repository_owner }}/db-storage.git db-repo || mkdir db-repo
          fi
          (
            cd db-repo
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            if [ ! -d .git ]; then
              git init
              git remote add origin https://x-access-token:${{ secrets.UPLOAD_API_TOKEN }}@github.com/${{ github.repository_owner }}/db-storage.git
            fi
            find . -maxdepth 1 ! -name '.git' ! -name '.' ! -name '..' -exec rm -rf {} +
            cp -r ../app/data/db/* . 2>/dev/null || true
            git checkout --orphan temp-branch 2>/dev/null || git checkout -b temp-branch
            git add -A
            git commit -m "db backup" --allow-empty
            git branch -M main
            git push -f origin main
          )
          echo "=== Done ==="