name: Fix Tailscale

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Fix Tailscale ACL and Authkey
        env:
          TS_API_KEY: ${{ secrets.TS_API_KEY }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          pip install pynacl requests -q
          python3 << 'PYEOF'
          import os, json, sys, base64, requests

          api_key = os.environ.get("TS_API_KEY", "")
          gh_pat = os.environ.get("GH_PAT", "")
          repo = os.environ.get("GITHUB_REPOSITORY", "")

          if not api_key:
              print("TS_API_KEY not set")
              sys.exit(1)

          auth = (api_key, "")

          # Step 1: Get current ACL
          print("=== Fetching current ACL ===")
          try:
              r = requests.get("https://api.tailscale.com/api/v2/tailnet/-/acl", auth=auth, headers={"Accept": "application/json"})
              print(f"ACL GET status: {r.status_code}")
              if r.status_code != 200:
                  print(f"Error: {r.text}")
                  sys.exit(1)
              acl = r.json()
          except Exception as e:
              print(f"Error fetching ACL: {e}")
              sys.exit(1)

          print(json.dumps(acl, indent=2)[:2000])

          # Step 2: Check and fix nodeAttrs for funnel
          print("\n=== Checking funnel in nodeAttrs ===")
          node_attrs = acl.get("nodeAttrs", [])
          found = False
          for attr_entry in node_attrs:
              targets = attr_entry.get("target", [])
              attrs = attr_entry.get("attr", [])
              if "tag:ci" in targets:
                  if "funnel" not in attrs:
                      attrs.append("funnel")
                      print("Added 'funnel' to existing tag:ci nodeAttrs entry")
                  else:
                      print("'funnel' already present for tag:ci")
                  found = True
                  break

          if not found:
              node_attrs.append({
                  "target": ["tag:ci"],
                  "attr": ["funnel"]
              })
              acl["nodeAttrs"] = node_attrs
              print("Added new nodeAttrs entry for tag:ci with funnel")
          elif found and "funnel" in [a for entry in node_attrs for a in entry.get("attr", []) if "tag:ci" in entry.get("target", [])]:
              print("ACL already has funnel for tag:ci")
          else:
              # Update ACL
              print("\n=== Updating ACL ===")
              r2 = requests.post(
                  "https://api.tailscale.com/api/v2/tailnet/-/acl",
                  auth=auth,
                  headers={"Content-Type": "application/json"},
                  json=acl
              )
              print(f"ACL update status: {r2.status_code}")
              if r2.status_code in (200, 201, 204):
                  print("ACL updated successfully!")
              else:
                  print(f"ACL update response: {r2.text}")

          # If we didn't need to update, still confirm
          if found:
              # Re-check after potential update
              pass

          # Step 3: Generate new authkey
          print("\n=== Generating new authkey ===")
          try:
              r3 = requests.post(
                  "https://api.tailscale.com/api/v2/tailnet/-/keys",
                  auth=auth,
                  headers={"Content-Type": "application/json"},
                  json={
                      "capabilities": {
                          "devices": {
                              "create": {
                                  "reusable": True,
                                  "ephemeral": False,
                                  "preauthorized": True,
                                  "tags": ["tag:ci"]
                              }
                          }
                      },
                      "expirySeconds": 7776000
                  }
              )
              print(f"Authkey creation status: {r3.status_code}")
              key_data = r3.json()
              new_key = key_data.get("key", "")
              if new_key:
                  print(f"::add-mask::{new_key}")
                  print(f"New authkey: {new_key[:20]}...")
              else:
                  print(f"Authkey creation response: {r3.text}")
                  sys.exit(1)
          except Exception as e:
              print(f"Error creating authkey: {e}")
              sys.exit(1)

          # Step 4: Update GitHub secret
          if gh_pat and new_key:
              print("\n=== Updating TAILSCALE_AUTHKEY secret ===")
              try:
                  # Get repo public key
                  r4 = requests.get(
                      f"https://api.github.com/repos/{repo}/actions/secrets/public-key",
                      headers={
                          "Authorization": f"Bearer {gh_pat}",
                          "Accept": "application/vnd.github.v3+json"
                      }
                  )
                  key_info = r4.json()
                  key_id = key_info["key_id"]
                  pub_key_b64 = key_info["key"]

                  # Encrypt the secret
                  from nacl.public import PublicKey, SealedBox
                  pub_key = PublicKey(base64.b64decode(pub_key_b64))
                  sealed_box = SealedBox(pub_key)
                  encrypted = sealed_box.encrypt(new_key.encode("utf-8"))
                  encrypted_b64 = base64.b64encode(encrypted).decode("utf-8")

                  # Update the secret
                  r5 = requests.put(
                      f"https://api.github.com/repos/{repo}/actions/secrets/TAILSCALE_AUTHKEY",
                      headers={
                          "Authorization": f"Bearer {gh_pat}",
                          "Accept": "application/vnd.github.v3+json",
                          "Content-Type": "application/json"
                      },
                      json={
                          "encrypted_value": encrypted_b64,
                          "key_id": key_id
                      }
                  )
                  if r5.status_code in (201, 204):
                      print("TAILSCALE_AUTHKEY secret updated successfully!")
                  else:
                      print(f"Secret update failed: {r5.status_code} {r5.text}")
                      print(f"Please manually update TAILSCALE_AUTHKEY with: {new_key}")
              except Exception as e:
                  print(f"Error updating secret: {e}")
                  print(f"Please manually update TAILSCALE_AUTHKEY with: {new_key}")
          else:
              print("GH_PAT not set, cannot update secret automatically")
              print(f"Please manually update TAILSCALE_AUTHKEY with: {new_key}")

          print("\n=== Done ===")
          PYEOF

      - name: Trigger Run Service
        run: |
          echo "Triggering Run Service..."
          curl -sf -X POST \
            -H "Authorization: Bearer ${{ secrets.UPLOAD_API_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Content-Type: application/json" \
            -d '{"ref":"main"}' \
            "https://api.github.com/repos/${{ github.repository_owner }}/web-service-runner/actions/workflows/run.yml/dispatches"
          echo "Run Service triggered!"