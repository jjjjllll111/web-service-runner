name: Check Funnel

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Test Tailscale Funnel
        run: |
          echo "=== Testing Tailscale Funnel ==="
          for i in 1 2 3; do
            CODE=$(curl -sk -o /dev/null -w '%{http_code}' "https://runner-funnel.tail782b5f.ts.net/" --max-time 15 --connect-timeout 10 2>/dev/null)
            echo "Attempt $i: HTTP $CODE ($(date -u +%H:%M:%S))"
            sleep 5
          done

      - name: Try to find Cloudflare URL from recent run logs
        env:
          GH_TOKEN: ${{ secrets.UPLOAD_API_TOKEN }}
        run: |
          echo "=== Looking for Cloudflare URL ==="
          # Get the latest Run Service run
          RUN_ID=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/actions/runs?per_page=5" | \
            jq -r '.workflow_runs[] | select(.name=="Run Service") | .id' | head -1)
          echo "Latest Run Service ID: $RUN_ID"
          
          if [ -n "$RUN_ID" ]; then
            # Get job ID
            JOB_ID=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
              "https://api.github.com/repos/${{ github.repository }}/actions/runs/$RUN_ID/jobs" | \
              jq -r '.jobs[0].id')
            echo "Job ID: $JOB_ID"
            
            # Try to get logs (may fail if still running)
            curl -s -H "Authorization: Bearer $GH_TOKEN" -L \
              "https://api.github.com/repos/${{ github.repository }}/actions/jobs/$JOB_ID/logs" \
              -o /tmp/run_logs.txt 2>/dev/null
            
            if [ -f /tmp/run_logs.txt ]; then
              CF_URL=$(grep -o 'https://[a-z0-9-]*\.trycloudflare\.com' /tmp/run_logs.txt | head -1)
              if [ -n "$CF_URL" ]; then
                echo "Found Cloudflare URL: $CF_URL"
                echo ""
                echo "=== Testing Cloudflare Tunnel ==="
                for i in 1 2 3; do
                  CODE=$(curl -sk -o /dev/null -w '%{http_code}' "$CF_URL/" --max-time 15 --connect-timeout 10 2>/dev/null)
                  echo "Attempt $i: HTTP $CODE ($(date -u +%H:%M:%S))"
                  sleep 5
                done
              else
                echo "Cloudflare URL not found in logs (run may still be in progress)"
              fi
            fi
          fi